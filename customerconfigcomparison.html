        <script src="https://cdn.plot.ly/plotly-2.20.0.min.js" charset="utf-8"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

        <script>

            function createTrace(name, x, y, type) {
                return {
                    x: x,
                    y: y,
                    name: name,
                    type: type
                };
            }

            function sortDescending(data, key) {
                return data.sort((a,b) => b[key] - a[key]);
            }

            function basicBarChart(id, x, y) {
                var data = [{
                    x: x,
                    y: y,
                    type: 'bar'
                }]
                Plotly.newPlot(id, data)
            }

            function stackedBarChart(id, data){
                var layout = {barmode: 'stack'};

                Plotly.newPlot(id, data, layout);
            }
            function showRPSChart(data){
                basicBarChart('rps', data.map(c => c.name), data.map(c => c.rps) );
            }
            function showSitesChart(data){
                data = data.sort((a,b) => b.sites - a.sites);
                basicBarChart('sites', data.map(c => c.name), data.map(c => c.sites) );
            }

            function showUsersChart(data){
                data = data.sort((a,b) => b.users - a.users);
                basicBarChart('users', data.map(c => c.name), data.map(c => c.users) );
            }

            function showRulesChart(data){
                data = data.sort((a,b) => b.corp_rules - a.corp_rules);
                var corpTrace = createTrace('Corp Rules', data.map(c => c.name), data.map(c => c.corp_rules), 'bar');
                var siteTrace = createTrace('Site Rules', data.map(c => c.name), data.map(c => c.rules_site), 'bar');
                var traces = [corpTrace, siteTrace];
                var layout = {barmode: 'stack'};

                stackedBarChart('rules', traces);
            }
